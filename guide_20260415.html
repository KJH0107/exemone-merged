const initialState = {
  isOpen: false,
  activeFeature: null,
  isDrawerOpen: false,
  pendingDetailFeature: null,
  completedChallenges: [],
  selectedInstance: null,
  drawerTab: '정보',
};

function guideReducer(state, action) {
  switch (action.type) {
    case 'TOGGLE_GUIDE':
      return { ...state, isOpen: !state.isOpen, activeFeature: null };
    case 'SET_FEATURE':
      return { ...state, activeFeature: action.id };
    case 'OPEN_DRAWER':
      return { ...state, isDrawerOpen: true, drawerTab: '정보', activeFeature: state.pendingDetailFeature || null, pendingDetailFeature: null };
    case 'CLOSE_DRAWER':
      return { ...state, isDrawerOpen: false, selectedInstance: null, activeFeature: null };
    case 'SET_PENDING':
      return { ...state, pendingDetailFeature: action.id };
    case 'COMPLETE_CHALLENGE':
      if (state.completedChallenges.includes(action.id)) return state;
      return { ...state, completedChallenges: [...state.completedChallenges, action.id] };
    case 'SELECT_INSTANCE':
      return { ...state, selectedInstance: action.instance, isDrawerOpen: true, drawerTab: '정보',
        activeFeature: state.isOpen ? (state.pendingDetailFeature || 'drawer-info') : null,
        pendingDetailFeature: null };
    case 'SET_DRAWER_TAB':
      return { ...state, drawerTab: action.tab };
    case 'CLOSE_GUIDE':
      return { ...state, isOpen: false, activeFeature: null };
    default:
      return state;
  }
}

// GUIDE HIGHLIGHT WRAPPER
// ═══════════════════════════════════════════════════════════
function GuideHighlight({ id, children, style = {} }) {
  const { state, dispatch } = useGuide();
  if (!state.isOpen) return <div style={style}>{children}</div>;

  const pageFeatures = state.isDrawerOpen ? PAGE_FEATURES['database-detail'] : PAGE_FEATURES['database'];
  const feature = pageFeatures?.features.find(f => f.highlightArea === id);
  if (!feature) return <div style={style}>{children}</div>;

  const isActive = state.activeFeature === feature.id;
  const isPending = state.pendingDetailFeature === feature.id;

  const shadowColor = isPending ? '#0d9488' : '#2563eb';
  const boxShadow = isActive
    ? `0 0 0 3px ${shadowColor}, 0 0 0 6px ${shadowColor}33`
    : `0 0 0 2px ${shadowColor}66`;

  return (
    <div
      style={{
        ...style,
        boxShadow,
        borderRadius: 8,
        cursor: 'pointer',
        transition: 'box-shadow .2s',
        position: 'relative',
      }}
      onClick={() => {
        if (isActive) dispatch({ type: 'COMPLETE_CHALLENGE', id: feature.id });
        else dispatch({ type: 'SET_FEATURE', id: feature.id });
      }}
    >
      {children}
      {isActive && (
        <div style={{
          position: 'absolute', top: -28, left: 0, zIndex: 20,
          background: shadowColor, color: '#fff',
          fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: '4px 4px 0 0',
          pointerEvents: 'none', whiteSpace: 'nowrap',
        }}>
          {feature.label}
        </div>
      )}
    </div>
  );
}

function ChallengeCard({ featureId, challenge }) {
  const { state, dispatch } = useGuide();
  const done = state.completedChallenges.includes(featureId);
  const [quizSelected, setQuizSelected] = useState(null);
  const quizAnswered = quizSelected !== null;
  const quizCorrect = quizSelected === challenge.quiz?.answer;

  return (
    <div style={{ border: done ? '2px solid #10b981' : '2px dashed #f59e0b', borderRadius: 12, overflow: 'hidden', marginTop: 4 }}>
      <div style={{ background: done ? '#ecfdf5' : '#fffbeb', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 8, borderBottom: done ? '1px solid #a7f3d0' : '1px solid #fde68a' }}>
        <span style={{ fontSize: 18 }}>{done ? '✅' : '🎯'}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: done ? '#065f46' : '#92400e' }}>{done ? '완료!' : '직접 해보세요'}</div>
          <div style={{ fontSize: 11, color: done ? '#059669' : '#b45309', marginTop: 1 }}>{done ? '이 기능을 직접 체험했습니다' : challenge.prompt}</div>
        </div>
      </div>

      {!done && (
        <div style={{ padding: '12px 14px', background: '#fff' }}>
          <p style={{ fontSize: 13, color: '#374151', lineHeight: 1.75, margin: '0 0 12px', wordBreak: 'keep-all' }}>{challenge.action}</p>
          {challenge.quiz && (
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#374151', marginBottom: 8 }}>💬 {challenge.quiz.question}</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {challenge.quiz.options.map((opt, i) => {
                  const isSelected = quizSelected === i;
                  const isCorrect = i === challenge.quiz.answer;
                  const bg = !quizAnswered ? (isSelected ? '#eff6ff' : '#f9fafb') : (isCorrect ? '#ecfdf5' : isSelected ? '#fef2f2' : '#f9fafb');
                  const border = !quizAnswered ? (isSelected ? '#3b82f6' : '#e5e7eb') : (isCorrect ? '#10b981' : isSelected ? '#ef4444' : '#e5e7eb');
                  const color = !quizAnswered ? '#374151' : (isCorrect ? '#065f46' : isSelected ? '#991b1b' : '#9ca3af');
                  return (
                    <button key={i} disabled={quizAnswered} onClick={() => setQuizSelected(i)} style={{
                      width: '100%', textAlign: 'left', padding: '8px 12px', borderRadius: 7,
                      border: `1.5px solid ${border}`, background: bg, color, fontSize: 12,
                      cursor: quizAnswered ? 'default' : 'pointer', display: 'flex', alignItems: 'center', gap: 8,
                      fontWeight: quizAnswered && isCorrect ? 700 : 400,
                    }}>
                      <span style={{ width: 20, height: 20, borderRadius: '50%', flexShrink: 0, background: border, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>
                        {quizAnswered ? (isCorrect ? '✓' : isSelected ? '✗' : String.fromCharCode(65 + i)) : String.fromCharCode(65 + i)}
                      </span>
                      {opt}
                    </button>
                  );
                })}
              </div>
              {quizAnswered && (
                <div style={{ marginTop: 8, padding: '8px 12px', borderRadius: 7, background: quizCorrect ? '#ecfdf5' : '#fef2f2', fontSize: 12, color: quizCorrect ? '#065f46' : '#991b1b', fontWeight: 600, lineHeight: 1.5 }}>
                  {quizCorrect ? '✅ 정답입니다!' : `❌ 정답은 "${challenge.quiz.options[challenge.quiz.answer]}"입니다.`}
                </div>
              )}
            </div>
          )}
          <button onClick={() => dispatch({ type: 'COMPLETE_CHALLENGE', id: featureId })} style={{ width: '100%', padding: '9px', borderRadius: 8, background: '#f59e0b', border: 'none', color: '#fff', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
            해봤어요! ✓
          </button>
        </div>
      )}
      {done && (
        <div style={{ padding: '10px 14px', background: '#ecfdf5', fontSize: 13, color: '#065f46', lineHeight: 1.75, wordBreak: 'keep-all' }}>{challenge.success}</div>
      )}
    </div>
  );
}

                <button key={rel.id} onClick={() => onSelect(rel.id)} style={{ width: '100%', textAlign: 'left', cursor: 'pointer', padding: '10px 14px', borderRadius: 9, border: `1.5px solid ${t.headerBorder}`, background: t.headerBg, display: 'flex', alignItems: 'flex-start', gap: 10, transition: 'all .15s' }}

            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 18 }}>🔍</span>
              <span style={{ fontSize: 14, fontWeight: 800, color: '#134e4a' }}>장애 분석 플로우로 이어가기</span>

            <div><div style={{ fontSize: 11, color: '#94a3b8', marginBottom: 2 }}>이전</div><div style={{ fontSize: 12, fontWeight: 700, color: '#374151', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 120 }}>{prev.label}</div></div>

          <button onClick={() => onSelect(next.id)} style={{ flex: 1, padding: '10px 12px', borderRadius: 8, cursor: 'pointer', border: `1.5px solid ${t.accent}22`, background: `${t.accent}08`, display: 'flex', alignItems: 'center', gap: 8, flexDirection: 'row-reverse' }}>

            <div style={{ textAlign: 'right' }}><div style={{ fontSize: 11, color: '#94a3b8', marginBottom: 2 }}>다음</div><div style={{ fontSize: 12, fontWeight: 700, color: '#374151', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 120 }}>{next.label}</div></div>

      </div>
    </>
  );
}

// GUIDE PANEL LAYOUT
// ═══════════════════════════════════════════════════════════
function GuidePanelLayout() {
  const { state, dispatch } = useGuide();
  const pageKey = state.isDrawerOpen ? 'database-detail' : 'database';
  const pageFeatures = PAGE_FEATURES[pageKey];
  const theme = pageKey === 'database-detail' ? 'teal' : 'blue';

  const handleClose = () => dispatch({ type: 'CLOSE_GUIDE' });
  const handleSetFeature = (id) => dispatch({ type: 'SET_FEATURE', id });

  return (
    <>
      {state.isOpen && state.activeFeature && (
        <div onClick={() => dispatch({ type: 'SET_FEATURE', id: null })} style={{ position: 'fixed', inset: 0, right: GUIDE_PANEL_WIDTH, zIndex: 10, background: 'rgba(15,23,42,0.4)', backdropFilter: 'blur(1px)', cursor: 'pointer' }} />
      )}
      <div style={{ width: state.isOpen ? GUIDE_PANEL_WIDTH : 0, flexShrink: 0, overflow: 'hidden', transition: 'width .22s cubic-bezier(.4,0,.2,1)', position: 'relative' }}>
        <div style={{ width: GUIDE_PANEL_WIDTH, height: '100%', background: '#fff', borderLeft: '1px solid #e3e7ea', boxShadow: '-4px 0 24px rgba(0,0,0,.1)', display: 'flex', flexDirection: 'column', position: 'absolute', top: 0, right: 0, bottom: 0 }}>
          {pageFeatures ? (
            state.activeFeature ? (
              <DetailView
                feature={pageFeatures.features.find(f => f.id === state.activeFeature) || pageFeatures.features[0]}
                pageFeatures={pageFeatures}
                theme={theme}
                onBack={() => dispatch({ type: 'SET_FEATURE', id: null })}
                onSelect={handleSetFeature}
                onClose={handleClose}
              />
            ) : (
              <ListView pageFeatures={pageFeatures} theme={theme} onSelect={handleSetFeature} onClose={handleClose} />
            )
          ) : null}
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════
// SUMMARY BAR
// ═══════════════════════════════════════════════════════════
function SummaryBar({ instances, statusFilter, onFilter }) {
  const total = instances.length;
  const counts = { active: 0, warning: 0, critical: 0, nosignal: 0 };
  instances.forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });

  const cards = [
    { label: '전체', value: total, bg: '#eff6ff', color: '#1d4ed8', border: '#bfdbfe', key: null },
    { label: 'Active', value: counts.active, bg: '#f0fdf4', color: '#16a34a', border: '#bbf7d0', key: 'active' },
    { label: 'Warning', value: counts.warning, bg: '#fffbeb', color: '#d97706', border: '#fde68a', key: 'warning' },
    { label: 'Critical', value: counts.critical, bg: '#fef2f2', color: '#dc2626', border: '#fecaca', key: 'critical' },
    { label: 'No Signal', value: counts.nosignal, bg: '#f9fafb', color: '#6b7280', border: '#e5e7eb', key: 'nosignal' },
  ];

  return (
    <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
      {cards.map(c => {
        const isActive = statusFilter === c.key;
        return (
          <div key={c.label} onClick={() => onFilter(isActive ? null : c.key)} style={{ flex: 1, minWidth: 90, padding: '10px 14px', background: c.bg, border: `1.5px solid ${isActive ? c.color : c.border}`, borderRadius: 10, cursor: 'pointer', transition: 'all .15s', boxShadow: isActive ? `0 0 0 2px ${c.color}44` : 'none' }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: c.color }}>{c.value}</div>
            <div style={{ fontSize: 11, color: c.color, fontWeight: 600, marginTop: 2 }}>{c.label}</div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// HEX GRID
// ═══════════════════════════════════════════════════════════
function HexGrid({ instances, onSelect, selectedId }) {
  const [tooltip, setTooltip] = useState(null);
  return (
    <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 16px', marginBottom: 14 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: '#64748b', marginBottom: 12 }}>Instance Map</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center', minHeight: 80, position: 'relative' }}>
        {instances.map(inst => {
          const cfg = STATUS_CONFIG[inst.status];
          const isSelected = inst.id === selectedId;
          return (
            <div key={inst.id} style={{ position: 'relative' }}
              onMouseEnter={() => setTooltip(inst.id)}
              onMouseLeave={() => setTooltip(null)}
              onClick={() => onSelect(inst)}
            >
              <div style={{
                width: 52, height: 52,
                clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
                background: cfg.hex,
                cursor: 'pointer',
                opacity: inst.status === 'nosignal' ? 0.5 : 1,
                border: isSelected ? '3px solid #1e293b' : 'none',
                transform: isSelected ? 'scale(1.1)' : 'scale(1)',
                transition: 'transform .15s',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <span style={{ fontSize: 9, fontWeight: 700, color: '#fff', textAlign: 'center', lineHeight: 1.2, padding: '0 4px', wordBreak: 'break-all' }}>{inst.name.split('-').slice(-1)[0]}</span>
              </div>
              {tooltip === inst.id && (
                <div style={{ position: 'absolute', bottom: '110%', left: '50%', transform: 'translateX(-50%)', background: '#1e293b', color: '#fff', padding: '6px 10px', borderRadius: 7, fontSize: 11, whiteSpace: 'nowrap', zIndex: 50, pointerEvents: 'none', lineHeight: 1.7, boxShadow: '0 4px 12px rgba(0,0,0,.3)' }}>
                  <div style={{ fontWeight: 700 }}>{inst.name}</div>
                  <div>CPU: {inst.cpuUsage}%  MEM: {inst.memoryUsed}%</div>
                  <div>Sessions: {inst.activeSessions}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', gap: 12, marginTop: 12, flexWrap: 'wrap' }}>
        {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
          <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, color: '#64748b' }}>
            <span style={{ width: 10, height: 10, borderRadius: 2, background: cfg.hex, display: 'inline-block' }} />
            {cfg.label}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// USAGE BAR
// ═══════════════════════════════════════════════════════════
function UsageBar({ value, critical, warning }) {
  const color = critical ? '#ef4444' : warning ? '#f59e0b' : '#10b981';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <div style={{ flex: 1, height: 5, background: '#e2e8f0', borderRadius: 3, overflow: 'hidden', minWidth: 50 }}>
        <div style={{ height: '100%', width: `${value}%`, background: color, borderRadius: 3, transition: 'width .3s' }} />
      </div>
      <span style={{ fontSize: 11, fontWeight: 600, color, minWidth: 32, textAlign: 'right' }}>{value}%</span>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// INSTANCE TABLE
// ═══════════════════════════════════════════════════════════
function InstanceTable({ instances, onSelect, selectedId, pendingDetailFeature }) {
  const [sortDir, setSortDir] = useState(null); // null | 'asc' | 'desc'
  const sorted = [...instances];
  if (sortDir === 'desc') sorted.sort((a, b) => b.cpuUsage - a.cpuUsage);
  else if (sortDir === 'asc') sorted.sort((a, b) => a.cpuUsage - b.cpuUsage);

  const toggleSort = () => setSortDir(prev => prev === 'desc' ? 'asc' : 'desc');

  return (
    <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden', position: 'relative' }}>
      {pendingDetailFeature && (
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(13,148,136,0.08)', border: '2px solid #0d9488', borderRadius: 8, zIndex: 5, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 16, pointerEvents: 'none' }}>
          <div style={{ background: '#0d9488', color: '#fff', fontSize: 12, fontWeight: 700, padding: '6px 16px', borderRadius: 20, boxShadow: '0 4px 12px rgba(0,0,0,.2)' }}>
            인스턴스를 클릭하면 장애 분석 가이드가 시작됩니다 →
          </div>
        </div>
      )}
      <div style={{ padding: '10px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 13, fontWeight: 700 }}>인스턴스 목록</span>
        <span style={{ fontSize: 12, color: '#94a3b8' }}>총 {instances.length}개</span>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr style={{ background: '#f8fafc', borderBottom: '1px solid var(--border)' }}>
              {['인스턴스명','DB Type','그룹'].map(h => (
                <th key={h} style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, color: '#475569', whiteSpace: 'nowrap', borderRight: '1px solid #f0f2f4' }}>{h}</th>
              ))}
              <th onClick={toggleSort} style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, color: '#2563eb', whiteSpace: 'nowrap', borderRight: '1px solid #f0f2f4', cursor: 'pointer', userSelect: 'none' }}>
                CPU Usage {sortDir === 'desc' ? '↓' : sortDir === 'asc' ? '↑' : '↕'}
              </th>
              <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, color: '#475569', whiteSpace: 'nowrap', borderRight: '1px solid #f0f2f4' }}>Memory</th>
              <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, color: '#475569', whiteSpace: 'nowrap', borderRight: '1px solid #f0f2f4' }}>Active Sessions</th>
              <th style={{ padding: '8px 14px', textAlign: 'left', fontWeight: 700, color: '#475569', whiteSpace: 'nowrap' }}>Status</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(inst => {
              const s = STATUS_CONFIG[inst.status];
              const isSelected = inst.id === selectedId;
              return (
                <tr key={inst.id} onClick={() => onSelect(inst)} style={{ borderBottom: '1px solid #f0f2f4', background: isSelected ? '#eff6ff' : 'transparent', cursor: 'pointer', transition: 'background .1s' }}
                  onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = '#f8fafc'; }}
                  onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = 'transparent'; }}>
                  <td style={{ padding: '9px 14px', color: '#2563eb', fontWeight: 600 }}>{inst.name}</td>
                  <td style={{ padding: '9px 14px' }}><span style={{ background: '#eff6ff', color: '#1d4ed8', padding: '2px 7px', borderRadius: 4, fontSize: 11, fontWeight: 600 }}>{DB_LABEL[inst.dbType] || inst.dbType}</span></td>
                  <td style={{ padding: '9px 14px', color: '#64748b' }}>{inst.group}</td>
                  <td style={{ padding: '9px 14px', minWidth: 130 }}><UsageBar value={inst.cpuUsage} critical={inst.cpuUsage > 80} warning={inst.cpuUsage > 60} /></td>
                  <td style={{ padding: '9px 14px', minWidth: 120 }}><UsageBar value={inst.memoryUsed} critical={inst.memoryUsed > 85} warning={inst.memoryUsed > 70} /></td>
                  <td style={{ padding: '9px 14px', textAlign: 'center', fontWeight: 700, color: inst.activeSessions > 40 ? '#dc2626' : '#334155' }}>{inst.activeSessions}</td>
                  <td style={{ padding: '9px 14px' }}><span style={{ background: s.bg, color: s.color, padding: '3px 9px', borderRadius: 5, fontWeight: 700, fontSize: 11 }}>{s.label}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// FILTER PANEL
// ═══════════════════════════════════════════════════════════
function FilterPanel({ selectedTypes, onToggle }) {
  const types = [
    { key: 'postgresql', label: 'PostgreSQL', color: '#336791' },
    { key: 'mysql', label: 'MySQL', color: '#e37b00' },
    { key: 'oracle', label: 'Oracle', color: '#c74634' },
  ];
  return (
    <div style={{ width: 180, flexShrink: 0, background: '#fff', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 16px', height: 'fit-content' }}>
      <div style={{ fontSize: 12, fontWeight: 800, color: '#374151', marginBottom: 12, letterSpacing: 0.5 }}>DB 타입 필터</div>
      {types.map(t => {
        const checked = selectedTypes.includes(t.key);
        return (
          <label key={t.key} style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 10, cursor: 'pointer' }}>
            <input type="checkbox" checked={checked} onChange={() => onToggle(t.key)} style={{ width: 15, height: 15, cursor: 'pointer', accentColor: t.color }} />
            <span style={{ fontSize: 13, color: '#374151', fontWeight: checked ? 700 : 400 }}>{t.label}</span>
          </label>
        );
      })}
      {selectedTypes.length > 0 && (
        <button onClick={() => onToggle('__clear__')} style={{ marginTop: 6, fontSize: 11, color: '#94a3b8', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>전체 해제</button>
      )}

  );
}

// ═══════════════════════════════════════════════════════════
// DRAWER TABS CONTENT
// ═══════════════════════════════════════════════════════════
function DrawerTabContent({ tab, instance }) {
  if (tab === '액티브 세션') return <ActiveSessionTab instance={instance} />;
  if (tab === '정보') return <InfoTab instance={instance} />;
  if (tab === '메트릭') return <MetricTab />;
  if (tab === 'SQL 목록') return <SqlListTab />;
  if (tab === 'Lock 정보') return <LockTab />;
  if (tab === '알람') return <AlertTab />;
  if (tab === '파라미터') return <ParameterTab />;
  if (tab === '호스트 프로세스 목록') return <HostProcessTab />;
  return <PlaceholderTab tab={tab} />;
}

    ['운영체제', 'Ubuntu 22.04 LTS'], ['커널 버전', '5.15.0-92-generic'],

// DATABASE PAGE
// ═══════════════════════════════════════════════════════════
function DatabasePage() {
  const { state, dispatch } = useGuide();
  const [statusFilter, setStatusFilter] = useState(null);
  const [typeFilters, setTypeFilters] = useState([]);

  const filtered = MOCK_INSTANCES.filter(inst => {
    if (statusFilter && inst.status !== statusFilter) return false;
    if (typeFilters.length > 0 && !typeFilters.includes(inst.dbType)) return false;
    return true;
  });

  const handleToggleType = (key) => {
    if (key === '__clear__') { setTypeFilters([]); return; }
    setTypeFilters(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
  };

  const handleSelectInstance = (inst) => {
    dispatch({ type: 'SELECT_INSTANCE', instance: inst });
  };

  return (
    <div style={{ display: 'flex', height: '100%', gap: 14 }}>
      {/* 왼쪽 필터 */}
      <GuideHighlight id="filter">
        <FilterPanel selectedTypes={typeFilters} onToggle={handleToggleType} />
      </GuideHighlight>

      {/* 오른쪽 메인 */}
      <div style={{ flex: 1, overflow: 'auto', minWidth: 0 }}>
        <GuideHighlight id="summary">
          <SummaryBar instances={MOCK_INSTANCES} statusFilter={statusFilter} onFilter={setStatusFilter} />
        </GuideHighlight>
        <GuideHighlight id="hexgrid">
          <HexGrid instances={filtered} onSelect={handleSelectInstance} selectedId={state.selectedInstance?.id} />
        </GuideHighlight>
        <GuideHighlight id="table">
          <InstanceTable instances={filtered} onSelect={handleSelectInstance} selectedId={state.selectedInstance?.id} pendingDetailFeature={state.pendingDetailFeature} />
        </GuideHighlight>
      </div>
    </div>
  );
}

      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        {state.completedChallenges.length > 0 && (
          <span style={{ fontSize: 11, background: '#d1fae5', color: '#059669', padding: '4px 10px', borderRadius: 99, fontWeight: 700 }}>
            챌린지 {state.completedChallenges.length}개 완료
          </span>
        )}
        <button onClick={() => dispatch({ type: 'TOGGLE_GUIDE' })} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '7px 16px', borderRadius: 8, border: 'none', background: state.isOpen ? '#2563eb' : '#eff6ff', color: state.isOpen ? '#fff' : '#2563eb', fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all .2s' }}>
          <span style={{ fontSize: 15 }}>📖</span>
          <span>{state.isOpen ? '가이드 닫기' : '기능 가이드'}</span>
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [state, dispatch] = useReducer(guideReducer, initialState);
  const drawerOffset = state.isOpen ? GUIDE_PANEL_WIDTH : 0;

  return (
    <GuideCtx.Provider value={{ state, dispatch }}>
      <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: '#f3f5f8' }}>
        <LeftSidebar />
        {/* main column */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
          <TopHeader />
          {/* body */}
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
            {/* page content — shifts when drawer opens */}
            <div style={{ flex: 1, overflow: 'auto', padding: '16px 20px', paddingRight: state.isDrawerOpen ? DRAWER_WIDTH + 20 : 20, transition: 'padding-right .3s', minWidth: 0 }}>
              <DatabasePage />
            </div>
            {/* guide panel */}
            <GuidePanelLayout />
          </div>
        </div>

        {/* Instance Drawer — fixed overlay */}
        <InstanceDrawer
          instance={state.selectedInstance}
          isOpen={state.isDrawerOpen}
          guideOpen={state.isOpen}
        />
      </div>
    </GuideCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
